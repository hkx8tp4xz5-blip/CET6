<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>系统登录</h2>

    <div class="error-msg" th:if="${!#strings.isEmpty(error)}" th:text="${error}">
        错误提示信息
    </div>

    <form method="post" th:action="@{/doLogin}" th:object="${user}">
        <div class="form-group">
            <label>用户名：</label>
            <input placeholder="请输入用户名" th:field="*{username}" type="text">
        </div>
        <div class="form-group">
            <label>密&nbsp;&nbsp;码：</label>
            <input placeholder="请输入密码" th:field="*{password}" type="password">
        </div>
        <button class="btn" type="submit">登 录</button>
    </form>
</div>

<div th:replace="~{common::foot(year=2025, company='JavaEE实验')}"></div>
</body>
</html>
